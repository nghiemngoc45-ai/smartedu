<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduMart — Quản trị</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');
  :root{
    --ink:#1f4773;--ink-deep:#163554;--paper:#f4f6f9;--surface:#fff;--line:#e6eaf0;
    --text:#23303c;--text-soft:#73808d;--marigold:#f0a92e;--coral:#e2563f;--green:#1a7a4a;
    --sidebar:#163554;--r:13px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--text);font-family:'Be Vietnam Pro',system-ui,sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  .serif{font-family:'Lora',serif;}

  .shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
  /* Sidebar */
  .side{background:var(--sidebar);color:#cdd9e6;display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh;}
  .side .logo{display:flex;align-items:center;gap:9px;padding:6px 8px 18px;}
  .side .logo .mark{width:34px;height:34px;border-radius:9px;background:var(--marigold);color:#5a3d00;display:flex;align-items:center;justify-content:center;}
  .side .logo .name{font-family:'Lora',serif;font-weight:600;font-size:19px;color:#fff;}
  .side .logo small{display:block;font-size:10.5px;color:#7e93ab;font-family:'Be Vietnam Pro';font-weight:400;letter-spacing:.05em;}
  .navg{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#6f86a0;padding:14px 10px 6px;}
  .nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:10px 11px;border-radius:9px;color:#cdd9e6;font-size:14px;margin-bottom:2px;transition:background .12s;}
  .nav-item:hover{background:rgba(255,255,255,.06);}
  .nav-item.on{background:var(--ink);color:#fff;font-weight:500;}
  .nav-item svg{flex-shrink:0;}
  .side-foot{margin-top:auto;display:flex;align-items:center;gap:10px;padding:12px 8px 4px;border-top:1px solid rgba(255,255,255,.08);}
  .side-foot .av{width:34px;height:34px;border-radius:50%;background:var(--marigold);color:#5a3d00;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;}
  .side-foot .nm{font-size:13px;color:#fff;font-weight:500;}
  .side-foot .rl{font-size:11px;color:#7e93ab;}

  /* Topbar + content */
  .main{display:flex;flex-direction:column;min-width:0;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--line);padding:16px 26px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:20;}
  .topbar h1{font-family:'Lora',serif;font-weight:600;font-size:22px;color:var(--ink-deep);margin:0;}
  .topbar .sp{flex:1;}
  .tb-search{display:flex;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:0 12px;height:38px;width:240px;}
  .tb-search input{border:none;background:none;outline:none;font-size:13.5px;padding:0 8px;width:100%;color:var(--text);}
  .tb-btn{width:38px;height:38px;border-radius:10px;background:var(--paper);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink);}
  .content{padding:24px 26px 50px;}

  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;}
  .kpi .top{display:flex;align-items:center;justify-content:space-between;}
  .kpi .ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .kpi .v{font-size:26px;font-weight:700;color:var(--ink-deep);margin-top:10px;}
  .kpi .l{font-size:13px;color:var(--text-soft);}
  .kpi .tr{font-size:12px;font-weight:600;margin-top:6px;}
  .tr.up{color:var(--green);} .tr.down{color:var(--coral);}

  .grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-top:18px;align-items:start;}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;}
  .panel .ph{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;}
  .panel h2{font-family:'Lora',serif;font-weight:600;font-size:17px;color:var(--ink-deep);margin:0;}
  .panel .ph a{font-size:12.5px;color:var(--ink);font-weight:500;}

  /* Chart */
  .chart{display:flex;align-items:flex-end;gap:12px;height:180px;padding-top:10px;}
  .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;}
  .bar{width:100%;max-width:34px;background:linear-gradient(180deg,var(--marigold),#e89518);border-radius:6px 6px 0 0;transition:height .6s ease;position:relative;}
  .bar:hover::after{content:attr(data-v);position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:var(--ink-deep);color:#fff;font-size:11px;padding:2px 7px;border-radius:5px;white-space:nowrap;}
  .bar-lbl{font-size:11.5px;color:var(--text-soft);}

  /* Lists / tables */
  .rowlist .row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
  .rowlist .row:last-child{border-bottom:none;}
  .rowlist .cover-sm{width:32px;height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .book-cover{width:30px;height:42px;border-radius:3px 4px 4px 3px;box-shadow:1px 2px 5px rgba(0,0,0,.15);padding:4px;display:flex;align-items:flex-end;color:#fff;font-size:6px;font-family:'Lora',serif;overflow:hidden;line-height:1.1;}
  .obj-cover{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-soft);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line);}
  td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .prod-cell{display:flex;align-items:center;gap:11px;}
  .prod-cell .nm{font-weight:500;}
  .badge{font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block;}
  .b-wait{background:#fdf2dc;color:#8a5a00;} .b-proc{background:#e7f0fa;color:var(--ink);}
  .b-ship{background:#e8e2f6;color:#5a3a8c;} .b-done{background:#e4f6ec;color:var(--green);}
  .b-cancel{background:#fae3df;color:var(--coral);}
  .b-stock{background:#e4f6ec;color:var(--green);} .b-low{background:#fdf2dc;color:#8a5a00;} .b-out{background:#fae3df;color:var(--coral);}
  .act-btn{font-size:12.5px;color:var(--ink);font-weight:500;padding:5px 10px;border:1px solid var(--line);border-radius:8px;}
  .act-btn:hover{background:var(--paper);}
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .toolbar .add{background:var(--ink);color:#fff;font-weight:500;font-size:13.5px;padding:9px 16px;border-radius:10px;display:flex;align-items:center;gap:7px;}
  .toolbar .add:hover{background:var(--ink-deep);}
  .toolbar .sp{flex:1;}
  .fchip{font-size:12.5px;padding:7px 13px;border-radius:20px;border:1px solid var(--line);color:var(--text);background:var(--surface);}
  .fchip.on{background:var(--ink);color:#fff;border-color:var(--ink);}

  .promo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .promo{border:1px solid var(--line);border-radius:var(--r);padding:18px;}
  .promo .code{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--coral);}
  .promo .d{font-size:13px;color:var(--text-soft);margin:6px 0 10px;}
  .promo .st{font-size:11.5px;}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--ink-deep);color:#fff;padding:12px 20px;border-radius:11px;font-size:14px;font-weight:500;opacity:0;transform:translateY(14px);transition:all .3s;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.2);}
  .toast.show{opacity:1;transform:none;}
  :focus-visible{outline:2.5px solid var(--marigold);outline-offset:2px;}

  @media (max-width:900px){.shell{grid-template-columns:1fr;}.side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;}.kpis{grid-template-columns:repeat(2,1fr);}.grid2,.promo-grid{grid-template-columns:1fr;}.navg,.side-foot{display:none;}.nav-item{width:auto;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(22,53,84,.4);display:none;align-items:center;justify-content:center;z-index:60;padding:20px;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .modal h2{font-family:'Lora',serif;font-size:19px;color:var(--ink-deep);margin:0 0 14px;}
  .modal label{display:block;font-size:12.5px;font-weight:500;color:var(--text-soft);margin:10px 0 5px;}
  .modal input,.modal select{width:100%;font-family:inherit;font-size:14px;border:1.5px solid var(--line);border-radius:9px;padding:10px 12px;outline:none;color:var(--text);background:var(--paper);}
  .modal input:focus,.modal select:focus{border-color:var(--ink);}
  .modal .mrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .modal .mact{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
  .del-btn{font-size:12.5px;color:var(--coral);font-weight:500;padding:5px 10px;border:1px solid #f1d6d0;border-radius:8px;margin-left:6px;}
  .del-btn:hover{background:#fae3df;}
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="logo"><span class="mark"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5a1 1 0 0 1 1-1h6v16H5a1 1 0 0 1-1-1Z"/><path d="M13 4h6a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-6"/></svg></span><span class="name">EduMart<small>Trang quản trị</small></span></div>
    <div class="navg">Tổng quan</div>
    <button class="nav-item on" data-v="overview" onclick="nav('overview',this)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Bảng điều khiển</button>
    <div class="navg">Quản lý</div>
    <button class="nav-item" data-v="products" onclick="nav('products',this)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 7l1 13h14l1-13M9 7V4h6v3"/></svg>Sản phẩm</button>
    <button class="nav-item" data-v="orders" onclick="nav('orders',this)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h14l-1 16H6L5 4Z"/><path d="M9 8h6"/></svg>Đơn hàng</button>
    <button class="nav-item" data-v="users" onclick="nav('users',this)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.5"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><path d="M16 5a3 3 0 0 1 0 6M18 20c0-2-1-3.5-3-4"/></svg>Người dùng</button>
    <button class="nav-item" data-v="promos" onclick="nav('promos',this)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12a2 2 0 0 1 0-4V5H4v3a2 2 0 0 1 0 4 2 2 0 0 1 0 4v3h16v-3a2 2 0 0 1 0-4Z"/><path d="M9 9h0M15 15h0M15 9l-6 6"/></svg>Khuyến mãi</button>
    <div class="navg">Hệ thống</div>
    <button class="nav-item" data-v="settings" onclick="nav('settings',this)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.5-2-1.5c.1-.3.1-.7.1-1Z"/></svg>Cài đặt</button>
    <a href="./" class="nav-item" style="margin-top:auto"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 6l-6 6 6 6"/></svg>Về trang mua sắm</a>
    <div class="side-foot" style="margin-top:14px"><div class="av">QT</div><div><div class="nm">Quản trị viên</div><div class="rl">admin@edumart.vn</div></div></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1 id="pageTitle">Bảng điều khiển</h1>
      <div class="sp"></div>
      <div class="tb-search"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#73808d" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg><input placeholder="Tìm kiếm…"></div>
      <button class="tb-btn" onclick="toast('Không có thông báo mới')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 8-3 8h18s-3-1-3-8M13.7 21a2 2 0 0 1-3.4 0"/></svg></button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
const fmt=n=>n.toLocaleString('vi-VN')+'đ';
const TITLES={overview:'Bảng điều khiển',products:'Sản phẩm',orders:'Đơn hàng',users:'Người dùng',promos:'Khuyến mãi',settings:'Cài đặt'};

const ALS={get(k,d){try{const v=localStorage.getItem('edumart_admin_'+k);return v===null?d:JSON.parse(v);}catch(e){return d;}},set(k,v){try{localStorage.setItem('edumart_admin_'+k,JSON.stringify(v));}catch(e){}}};
const DEF_PRODUCTS=[
  {id:1,name:'Bộ SGK lớp 6 - Kết nối tri thức',cat:'Sách',price:187000,stock:340,sold:1200,c:'#2f6ca5'},
  {id:2,name:'Dế Mèn phiêu lưu ký',cat:'Sách',price:45000,stock:88,sold:5400,c:'#3a7a52'},
  {id:5,name:'Atomic Habits',cat:'Sách',price:145000,stock:12,sold:6700,c:'#1f6e6e'},
  {id:7,name:'Combo bút bi Thiên Long 20 cây',cat:'Văn phòng phẩm',price:48000,stock:0,sold:9200,c:'#2563a8',icon:'pen'},
  {id:8,name:'Vở Campus 200 trang (lốc 10)',cat:'Văn phòng phẩm',price:102000,stock:210,sold:5600,c:'#e08a2e',icon:'note'},
  {id:11,name:'Máy tính Casio fx-580VN X',cat:'Thiết bị giáo dục',price:490000,stock:46,sold:3400,c:'#2b3a4a',icon:'calc'},
  {id:13,name:'Địa cầu phát sáng 25cm',cat:'Thiết bị giáo dục',price:210000,stock:7,sold:1600,c:'#2f6ca5',icon:'globe'}
];
const ICONS={pen:'<path d="M5 19l1-4L17 4l3 3L9 18l-4 1Z"/>',note:'<rect x="6" y="3" width="12" height="18" rx="2"/><path d="M9 7h6M9 11h6"/>',calc:'<rect x="5" y="3" width="14" height="18" rx="2"/><path d="M8 7h8M8 11h2M12 15h2"/>',globe:'<circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18"/>'};
function cover(p){
  if(p.cat==='Sách')return '<div class="book-cover" style="background:linear-gradient(150deg,'+p.c+',rgba(0,0,0,.35))">'+p.name.slice(0,14)+'</div>';
  return '<div class="obj-cover" style="background:linear-gradient(150deg,'+p.c+',rgba(0,0,0,.3))"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">'+(ICONS[p.icon]||'')+'</svg></div>';
}
function stockBadge(s){if(s===0)return '<span class="badge b-out">Hết hàng</span>';if(s<20)return '<span class="badge b-low">Sắp hết ('+s+')</span>';return '<span class="badge b-stock">Còn '+s+'</span>';}

const DEF_ORDERS=[
  {id:'48213',cust:'Ngọc Anh',role:'Học sinh',date:'10/06/2026',items:3,total:421000,status:'wait'},
  {id:'48212',cust:'Thầy Tuấn',role:'Giáo viên',date:'10/06/2026',items:12,total:1840000,status:'proc'},
  {id:'48210',cust:'THCS Lê Quý Đôn',role:'Trường học',date:'09/06/2026',items:120,total:14200000,status:'ship'},
  {id:'48207',cust:'Minh Hương',role:'Phụ huynh',date:'09/06/2026',items:5,total:560000,status:'done'},
  {id:'48201',cust:'Quốc Bảo',role:'Sinh viên',date:'08/06/2026',items:2,total:314000,status:'done'},
  {id:'48198',cust:'Lan Phương',role:'Học sinh',date:'08/06/2026',items:1,total:88000,status:'cancel'}
];
const STATUS={wait:['Chờ xác nhận','b-wait'],proc:['Đang xử lý','b-proc'],ship:['Đang giao','b-ship'],done:['Hoàn thành','b-done'],cancel:['Đã hủy','b-cancel']};

const USERS=[
  {name:'Ngọc Anh',role:'Học sinh',contact:'09xx xxx 123',orders:14,points:340},
  {name:'Thầy Tuấn',role:'Giáo viên ✔',contact:'tuan@school.edu.vn',orders:38,points:1280},
  {name:'THCS Lê Quý Đôn',role:'Trường học',contact:'lequydon@edu.vn',orders:9,points:0},
  {name:'Minh Hương',role:'Phụ huynh',contact:'09xx xxx 456',orders:22,points:560},
  {name:'Quốc Bảo',role:'Sinh viên',contact:'bao@gmail.com',orders:7,points:180}
];
const DEF_PROMOS=[
  {code:'EDU10',d:'Giảm 10% toàn sàn cho mọi đơn hàng',st:'Đang chạy · hết hạn 30/06',on:true},
  {code:'GIAOVIEN',d:'Ưu đãi 15% cho giáo viên đã xác thực',st:'Đang chạy · không giới hạn',on:true},
  {code:'TUUTRUONG',d:'Freeship đơn từ 200k mùa tựu trường',st:'Lên lịch · bắt đầu 15/08',on:false}
];

let PRODUCTS=ALS.get('products',DEF_PRODUCTS);
let ORDERS=ALS.get('orders',DEF_ORDERS);
let PROMOS=ALS.get('promos',DEF_PROMOS);
function saveP(){ALS.set('products',PRODUCTS);}
function saveO(){ALS.set('orders',ORDERS);}
function savePr(){ALS.set('promos',PROMOS);}

/* ---- Modal + CRUD ---- */
function openModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modalBg').classList.add('show');}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
function openProd(id){
  const p=id?PRODUCTS.find(x=>x.id===id):{name:'',cat:'Sách',price:0,stock:0};
  openModal('<h2>'+(id?'Sửa sản phẩm':'Thêm sản phẩm')+'</h2>'+
   '<label>Tên sản phẩm</label><input id="mName" value="'+p.name.replace(/"/g,'&quot;')+'">'+
   '<label>Danh mục</label><select id="mCat"><option'+(p.cat==='Sách'?' selected':'')+'>Sách</option><option'+(p.cat==='Văn phòng phẩm'?' selected':'')+'>Văn phòng phẩm</option><option'+(p.cat==='Thiết bị giáo dục'?' selected':'')+'>Thiết bị giáo dục</option></select>'+
   '<div class="mrow"><div><label>Giá (đ)</label><input id="mPrice" type="number" value="'+p.price+'"></div><div><label>Tồn kho</label><input id="mStock" type="number" value="'+p.stock+'"></div></div>'+
   '<div class="mact"><button class="act-btn" onclick="closeModal()">Hủy</button><button class="add" onclick="saveProd('+(id||0)+')">Lưu</button></div>');
}
function saveProd(id){
  const name=document.getElementById('mName').value.trim(); if(!name){toast('Nhập tên sản phẩm');return;}
  const cat=document.getElementById('mCat').value,price=+document.getElementById('mPrice').value||0,stock=+document.getElementById('mStock').value||0;
  if(id){Object.assign(PRODUCTS.find(x=>x.id===id),{name,cat,price,stock});}
  else{const nid=Math.max(0,...PRODUCTS.map(x=>x.id))+1;PRODUCTS.unshift({id:nid,name,cat,price,stock,sold:0,c:'#2f6ca5',icon:cat==='Sách'?undefined:'note'});}
  saveP();closeModal();toast('Đã lưu sản phẩm');render();
}
function delProd(id){PRODUCTS=PRODUCTS.filter(x=>x.id!==id);saveP();toast('Đã xóa sản phẩm');render();}
function advO(id){const o=ORDERS.find(x=>x.id===id);if(!o)return;const seq=['wait','proc','ship','done'];const i=seq.indexOf(o.status);if(i>=0&&i<seq.length-1){o.status=seq[i+1];saveO();toast('Đơn #'+id+' → '+STATUS[o.status][0]);render();}else{toast('Đơn đã ở trạng thái cuối');}}
function openPromo(){openModal('<h2>Tạo khuyến mãi</h2><label>Mã giảm giá</label><input id="mCode" placeholder="VD: HE2026"><label>Mô tả</label><input id="mDesc" placeholder="Giảm 12% toàn sàn"><div class="mact"><button class="act-btn" onclick="closeModal()">Hủy</button><button class="add" onclick="savePromo()">Tạo</button></div>');}
function savePromo(){const code=document.getElementById('mCode').value.trim().toUpperCase();const d=document.getElementById('mDesc').value.trim();if(!code||!d){toast('Nhập mã và mô tả');return;}PROMOS.unshift({code,d,st:'Đang chạy',on:true});savePr();closeModal();toast('Đã tạo mã '+code);render();}
function togglePromo(code){const p=PROMOS.find(x=>x.code===code);if(p){p.on=!p.on;savePr();toast(p.on?'Đã bật '+code:'Đã tắt '+code);render();}}

let view='overview';
function nav(v,el){
  view=v;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  document.getElementById('pageTitle').textContent=TITLES[v];
  render();
}
let toastT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1800);}

function render(){
  const c=document.getElementById('content');
  if(view==='overview')c.innerHTML=overview();
  else if(view==='products')c.innerHTML=products();
  else if(view==='orders')c.innerHTML=orders();
  else if(view==='users')c.innerHTML=users();
  else if(view==='promos')c.innerHTML=promos();
  else c.innerHTML=settings();
}

function overview(){
  const rev=[42,55,38,61,72,49,86]; const days=['T2','T3','T4','T5','T6','T7','CN']; const max=Math.max(...rev);
  const bars=rev.map((v,i)=>'<div class="bar-wrap"><div class="bar" data-v="'+(v)+' triệu" style="height:'+(v/max*100)+'%"></div><span class="bar-lbl">'+days[i]+'</span></div>').join('');
  const recent=ORDERS.slice(0,5).map(o=>'<div class="row"><div style="flex:1"><div style="font-weight:500">#'+o.id+' · '+o.cust+'</div><div style="font-size:12px;color:var(--text-soft)">'+o.items+' sản phẩm · '+o.date+'</div></div><div style="font-weight:600;margin-right:10px">'+fmt(o.total)+'</div><span class="badge '+STATUS[o.status][1]+'">'+STATUS[o.status][0]+'</span></div>').join('');
  const top=[...PRODUCTS].sort((a,b)=>b.sold-a.sold).slice(0,5).map(p=>'<div class="row"><div class="cover-sm">'+cover(p)+'</div><div style="flex:1"><div style="font-weight:500">'+p.name+'</div><div style="font-size:12px;color:var(--text-soft)">'+p.cat+'</div></div><div style="font-weight:600">'+(p.sold>=1000?(p.sold/1000).toFixed(1)+'k':p.sold)+' bán</div></div>').join('');
  return '<div class="kpis">'+
    kpi('#e7f0fa','var(--ink)','M3 3v18h18','402,5 triệu đ','Doanh thu tháng','up','+12,4% so với tháng trước')+
    kpi('#e4f6ec','var(--green)','M5 4h14l-1 16H6L5 4Z','1.284','Đơn hàng','up','+8,1%')+
    kpi('#fdf2dc','#8a5a00','M9 8a3 3 0 0 1 6 0','9.640','Người dùng','up','+5,6%')+
    kpi('#fae3df','var(--coral)','M4 7h16','3 sản phẩm','Sắp/đã hết hàng','down','Cần nhập thêm')+
  '</div>'+
  '<div class="grid2"><div class="panel"><div class="ph"><h2>Doanh thu 7 ngày qua</h2><a onclick="toast(\'Mở báo cáo chi tiết\')">Báo cáo ›</a></div><div class="chart">'+bars+'</div></div>'+
    '<div class="panel"><div class="ph"><h2>Đơn hàng gần đây</h2><a onclick="nav(\'orders\',document.querySelector(\'[data-v=orders]\'))">Tất cả ›</a></div><div class="rowlist">'+recent+'</div></div></div>'+
  '<div class="grid2" style="grid-template-columns:1fr 1fr"><div class="panel"><div class="ph"><h2>Sản phẩm bán chạy</h2><a onclick="nav(\'products\',document.querySelector(\'[data-v=products]\'))">Tất cả ›</a></div><div class="rowlist">'+top+'</div></div>'+
    '<div class="panel"><div class="ph"><h2>Cảnh báo tồn kho</h2></div><div class="rowlist">'+PRODUCTS.filter(p=>p.stock<20).map(p=>'<div class="row"><div class="cover-sm">'+cover(p)+'</div><div style="flex:1"><div style="font-weight:500">'+p.name+'</div></div>'+stockBadge(p.stock)+'</div>').join('')+'</div></div></div>';
}
function kpi(bg,fg,icon,v,l,trend,trtext){
  return '<div class="kpi"><div class="top"><div class="ic" style="background:'+bg+';color:'+fg+'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="'+icon+'"/></svg></div></div><div class="v">'+v+'</div><div class="l">'+l+'</div><div class="tr '+trend+'">'+trtext+'</div></div>';
}

function products(){
  return '<div class="toolbar"><button class="add" onclick="openProd()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>Thêm sản phẩm</button><button class="act-btn" onclick="toast(\'Tải lên file Excel\')">Đăng hàng loạt (Excel)</button><div class="sp"></div></div>'+
  '<div class="panel" style="padding:6px 8px"><table><thead><tr><th>Sản phẩm</th><th>Danh mục</th><th>Giá</th><th>Tồn kho</th><th>Đã bán</th><th></th></tr></thead><tbody>'+
  PRODUCTS.map(p=>'<tr><td><div class="prod-cell"><div class="cover-sm">'+cover(p)+'</div><span class="nm">'+p.name+'</span></div></td><td>'+p.cat+'</td><td style="font-weight:600">'+fmt(p.price)+'</td><td>'+stockBadge(p.stock)+'</td><td>'+p.sold.toLocaleString('vi-VN')+'</td><td style="white-space:nowrap"><button class="act-btn" onclick="openProd('+p.id+')">Sửa</button><button class="del-btn" onclick="delProd('+p.id+')">Xóa</button></td></tr>').join('')+
  '</tbody></table></div>';
}

let oFilter='all';
function orders(){
  const chips=[['all','Tất cả'],['wait','Chờ xác nhận'],['proc','Đang xử lý'],['ship','Đang giao'],['done','Hoàn thành'],['cancel','Đã hủy']];
  const list=oFilter==='all'?ORDERS:ORDERS.filter(o=>o.status===oFilter);
  return '<div class="toolbar">'+chips.map(c=>'<button class="fchip '+(oFilter===c[0]?'on':'')+'" onclick="oFilter=\''+c[0]+'\';render()">'+c[1]+'</button>').join('')+'</div>'+
  '<div class="panel" style="padding:6px 8px"><table><thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>Ngày</th><th>SL</th><th>Tổng tiền</th><th>Trạng thái</th><th></th></tr></thead><tbody>'+
  list.map(o=>'<tr><td style="font-weight:600">#'+o.id+'</td><td>'+o.cust+'<div style="font-size:11.5px;color:var(--text-soft)">'+o.role+'</div></td><td>'+o.date+'</td><td>'+o.items+'</td><td style="font-weight:600">'+fmt(o.total)+'</td><td><span class="badge '+STATUS[o.status][1]+'">'+STATUS[o.status][0]+'</span></td><td><button class="act-btn" onclick="advO(\''+o.id+'\')">Cập nhật ›</button></td></tr>').join('')+
  (list.length?'':'<tr><td colspan="7" style="text-align:center;color:var(--text-soft);padding:30px">Không có đơn hàng ở trạng thái này.</td></tr>')+
  '</tbody></table></div>';
}

function users(){
  return '<div class="panel" style="padding:6px 8px"><table><thead><tr><th>Tên</th><th>Vai trò</th><th>Liên hệ</th><th>Đơn hàng</th><th>Điểm</th><th></th></tr></thead><tbody>'+
  USERS.map(u=>'<tr><td style="font-weight:500">'+u.name+'</td><td>'+u.role+'</td><td>'+u.contact+'</td><td>'+u.orders+'</td><td>'+u.points.toLocaleString('vi-VN')+'</td><td><button class="act-btn" onclick="toast(\'Xem hồ sơ: '+u.name+'\')">Xem</button></td></tr>').join('')+
  '</tbody></table></div>';
}

function promos(){
  return '<div class="toolbar"><button class="add" onclick="openPromo()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>Tạo khuyến mãi</button></div>'+
  '<div class="promo-grid">'+PROMOS.map(p=>'<div class="promo"><div class="code">'+p.code+'</div><div class="d">'+p.d+'</div><div class="st"><span class="badge '+(p.on?'b-done':'b-wait')+'">'+(p.on?'Đang chạy':'Tạm tắt')+'</span></div><div style="margin-top:12px"><button class="act-btn" onclick="togglePromo(\''+p.code+'\')">'+(p.on?'Tắt':'Bật')+'</button></div></div>').join('')+'</div>';
}

function settings(){
  return '<div class="panel" style="max-width:560px"><div class="ph"><h2>Cài đặt hệ thống</h2></div>'+
  '<div style="display:flex;flex-direction:column;gap:14px;font-size:14px">'+
  ['Phí sàn và hoa hồng người bán','Vùng giao hàng và đối tác vận chuyển','Cổng thanh toán (MoMo, ZaloPay, VNPay)','Cấu hình hóa đơn điện tử VAT','Phân quyền quản trị viên'].map(s=>'<div style="display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border:1px solid var(--line);border-radius:11px"><span>'+s+'</span><button class="act-btn" onclick="toast(\'Mở cấu hình\')">Cấu hình</button></div>').join('')+
  '</div></div>';
}

render();
</script>
</body>
</html>
