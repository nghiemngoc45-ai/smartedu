  const yearCards=years.map(b=>{
    const pct=Math.round(b.used/b.total*100);const rem=b.total-b.used;
    return`<div class="panel" style="padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

        <div><div style="font-size:11px;color:var(--text-soft)">Tổng ngân sách</div><div style="font-weight:600;font-size:13px;color:var(--ink)">${fmtC(b.total)}</div></div>
        <div><div style="font-size:11px;color:var(--text-soft)">Đã sử dụng</div><div style="font-weight:600;font-size:13px;color:var(--acc)">${fmtC(b.used)}</div></div>
        <div><div style="font-size:11px;color:var(--text-soft)">Còn lại</div><div style="font-weight:600;font-size:13px;color:#15803d">${fmtC(rem)}</div></div>

      <div style="font-weight:600;margin-bottom:8px;font-size:13px">${s.l}</div>

      <div style="display:flex;justify-content:space-between;font-size:12px">
        <span style="color:var(--text-soft)">${fmtC(s.used)} / ${fmtC(s.budget)}</span>
        <span style="font-weight:600;color:${pct>=90?'#dc2626':pct>=75?'#f97316':'var(--acc)'}">${pct}%</span>
      </div>
    </div>`;
  }).join('');
  return`<div style="margin-bottom:20px">
    <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:12px">Ngân sách theo năm học</div>
    <div style="display:flex;flex-direction:column;gap:10px">${yearCards}</div>
  </div>
  <div>
    <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:12px">Ngân sách theo học kỳ (${rptYear})</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">${semCards}</div>
  </div>`;
}
function buildRptSuppliers(){
  const supMap={};
  ORDERS.forEach(o=>{
    if(!o.sup||o.sup==='—')return;
    if(!supMap[o.sup])supMap[o.sup]={name:o.sup,orders:0,total:0};
    supMap[o.sup].orders++;
    supMap[o.sup].total+=o.total;
  });
  let data=Object.values(supMap).sort((a,b)=>b.total-a.total);
  if(!data.length)data=[
    {name:'NXB Giáo Dục',orders:6,total:680e6},{name:'Thiết bị GD Việt Nam',orders:8,total:450e6},
    {name:'Nhà sách Tri Thức',orders:12,total:280e6},{name:'VPP Bút Chì Xanh',orders:15,total:120e6},
    {name:'VPP Minh Long',orders:9,total:95e6},
  ].sort((a,b)=>b.total-a.total);
  const grandTotal=data.reduce((s,d)=>s+d.total,0);
  const maxT=data[0].total;
  const rows=data.map((s,i)=>`<tr>
    <td style="font-weight:500"><div style="display:flex;align-items:center;gap:8px"><span style="color:var(--text-soft);font-size:12px;width:18px">#${i+1}</span>${s.name}</div></td>
    <td style="text-align:center;font-weight:600">${s.orders}</td>
    <td style="font-weight:600;white-space:nowrap">${fmtV(s.total)}đ</td>
    <td style="min-width:180px"><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;background:var(--line);border-radius:99px;height:6px"><div style="background:var(--acc);border-radius:99px;height:6px;width:${Math.round(s.total/maxT*100)}%"></div></div><span style="font-size:12px;color:var(--text-soft);white-space:nowrap;min-width:36px;text-align:right">${(s.total/grandTotal*100).toFixed(1)}%</span></div></td>
  </tr>`).join('');
  return`<div style="overflow:auto"><table><thead><tr><th>Nhà cung cấp</th><th style="text-align:center">Số đơn</th><th>Tổng giá trị</th><th>Tỷ lệ chi tiêu</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span id="cartBadge" style="display:none;position:absolute;top:-5px;right:-5px;background:var(--coral);color:#fff;font-size:9.5px;font-weight:700;min-width:17px;height:17px;border-radius:9px;padding:0 3px;align-items:center;justify-content:center;pointer-events:none">0</span>
        </button>
        <button class="tb-btn" onclick="nav('notifications',null)" title="Thông báo" style="position:relative">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 8-3 8h18s-3-1-3-8M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          <span id="notifBadge" style="display:${NOTIFS.length?'flex':'none'};position:absolute;top:-5px;right:-5px;background:var(--coral);color:#fff;font-size:9px;font-weight:700;min-width:17px;height:17px;border-radius:9px;padding:0 3px;align-items:center;justify-content:center;pointer-events:none">${NOTIFS.length}</span>
        </button>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>`;
}

/* ── Auth / Session ── */
function logout(){
  try{localStorage.removeItem('edumart_user');}catch(e){}
  window.location.href='./';
}

function init(){
  const mu=getMainUser();
  if(mu&&mu.role==='school'){
    currentUser=mu;
    ORG.name=mu.orgName||mu.name||ORG.name;
    renderShell();render();
  } else {
    window.location.href='./';
  }
}
init();
</script>
