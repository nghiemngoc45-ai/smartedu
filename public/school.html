<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sàn Hiệu Sách — Cổng Trường học</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');
:root{
  --ink:#1f4773;--ink-deep:#163554;--paper:#f4f6f9;--surface:#fff;--line:#e6eaf0;
  --text:#23303c;--text-soft:#73808d;--marigold:#f0a92e;--coral:#e2563f;--green:#1a7a4a;
  --amber:#d97706;--sidebar:#163554;--r:13px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Be Vietnam Pro',system-ui,sans-serif;color:var(--text);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.55;}
a{color:inherit;text-decoration:none;}button{font-family:inherit;cursor:pointer;border:none;background:none;}

/* ── Shell ── */
.shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}

/* ── Sidebar ── */
.side{background:var(--sidebar);color:#cdd9e6;display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;}
.side .logo{display:flex;align-items:center;gap:9px;padding:6px 8px 20px;}
.side .logo .mark{width:34px;height:34px;border-radius:9px;background:var(--marigold);color:#5a3d00;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.side .logo .name{font-family:'Lora',serif;font-weight:600;font-size:19px;color:#fff;}
.side .logo small{display:block;font-size:10.5px;color:#7e93ab;font-family:'Be Vietnam Pro';font-weight:400;letter-spacing:.05em;}
.navg{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#6f86a0;padding:14px 10px 6px;font-weight:600;}
.navg:first-child{padding-top:4px;}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:10px 11px;border-radius:9px;color:#cdd9e6;font-size:13.5px;margin-bottom:2px;transition:background .12s;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.06);}
.nav-item.on{background:var(--ink);color:#fff;font-weight:500;}
.nav-item svg{flex-shrink:0;stroke:currentColor;}
.nb{margin-left:auto;background:var(--marigold);color:#5a3d00;font-size:9.5px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.side-foot{margin-top:auto;display:flex;align-items:center;gap:10px;padding:12px 8px 4px;border-top:1px solid rgba(255,255,255,.08);}
.side-foot .av{width:34px;height:34px;border-radius:50%;background:var(--marigold);color:#5a3d00;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0;}
.side-foot .nm{font-size:13px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.side-foot .rl{font-size:11px;color:#7e93ab;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.side-foot .cog{color:#7e93ab;margin-left:auto;flex-shrink:0;transition:color .12s;}
.side-foot .cog:hover{color:#fff;}

/* ── Main ── */
.main{display:flex;flex-direction:column;min-width:0;}
.topbar{background:var(--surface);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20;}
.topbar h1{font-family:'Lora',serif;font-weight:600;font-size:21px;color:var(--ink-deep);margin:0;}
.topbar .sp{flex:1;}
.tb-btn{width:36px;height:36px;border-radius:10px;background:var(--paper);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--text-soft);transition:all .12s;}
.tb-btn:hover{color:var(--ink);border-color:var(--ink);}
.content{padding:24px 26px 48px;}

/* ── Org banner ── */
.org-banner{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.ob-av{width:44px;height:44px;border-radius:12px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0;}
.ob-info{flex:1;min-width:0;}
.ob-row1{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap;}
.ob-name{font-size:16px;font-weight:700;}
.ob-row2{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.ob-meta{font-size:11.5px;color:var(--text-soft);display:flex;align-items:center;gap:4px;}
.ob-acts{display:flex;gap:8px;flex-shrink:0;}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.bb{background:#dbeafe;color:#1e40af;}
.bg{background:#dcfce7;color:#15803d;}
.bo{background:#ffedd5;color:#c2410c;}
.br{background:#fee2e2;color:#b91c1c;}
.bp{background:#ede9fe;color:#6d28d9;}
.bs{background:#f1f5f9;color:#475569;}
.by{background:#fefce8;color:#92400e;}

/* ── KPI grid ── */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:11px;margin-bottom:18px;}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;transition:box-shadow .15s;cursor:default;}
.kpi:hover{box-shadow:0 4px 18px rgba(22,53,84,.09);}
.kpi .top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.kpi .ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.kpi .tr{font-size:11px;font-weight:600;}
.tr-up{color:var(--green);}
.tr-dn{color:var(--coral);}
.tr-wn{color:var(--amber);}
.kpi .val{font-size:22px;font-weight:700;line-height:1;margin-bottom:3px;color:var(--ink-deep);}
.kpi .lbl{font-size:12.5px;font-weight:500;margin-bottom:2px;}
.kpi .sub{font-size:10.5px;color:var(--text-soft);}

/* ── Panels ── */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.ph h3{font-family:'Lora',serif;font-weight:600;font-size:15px;color:var(--ink-deep);}
.ph .phsub{font-size:11px;color:var(--text-soft);margin-top:2px;}
.ph .phact{font-size:12px;color:var(--ink);font-weight:500;display:flex;align-items:center;gap:4px;cursor:pointer;margin-top:2px;white-space:nowrap;}
.ph .phact:hover{color:var(--ink-deep);}
.charts-row{display:grid;grid-template-columns:1fr 300px;gap:16px;margin-bottom:16px;}
.bottom-row{display:grid;grid-template-columns:1fr 300px;gap:16px;}

/* ── Donut legend ── */
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:10px;}
.leg-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-bottom:5px;}
.leg-left{display:flex;align-items:center;gap:7px;}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.leg-pct{font-weight:600;color:var(--text-soft);}

/* ── Notification list ── */
.notif-item{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--line);}
.notif-item:last-child{border-bottom:none;}
.ni-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.ni-txt{font-size:12px;color:var(--text);line-height:1.4;flex:1;}
.ni-time{font-size:10.5px;color:var(--text-soft);margin-top:2px;}
.ph-badge{display:flex;align-items:center;gap:6px;}
.cnt-badge{background:var(--marigold);color:#5a3d00;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-soft);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line);}
td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.tb-panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.toolbar .sp{flex:1;}
.fchip{font-size:12.5px;padding:7px 13px;border-radius:20px;border:1px solid var(--line);color:var(--text);background:var(--surface);cursor:pointer;transition:all .12s;}
.fchip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.fchip:hover:not(.on){border-color:var(--ink);color:var(--ink);}
.act-sm{font-size:12.5px;color:var(--ink);font-weight:500;padding:5px 10px;border:1px solid var(--line);border-radius:8px;transition:all .12s;}
.act-sm:hover{background:var(--paper);}
.del-sm{font-size:12.5px;color:var(--coral);font-weight:500;padding:5px 10px;border:1px solid #f1d6d0;border-radius:8px;}
.del-sm:hover{background:#fae3df;}
.btn-pr{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#fff;font-weight:500;font-size:13.5px;padding:9px 16px;border-radius:10px;}
.btn-pr:hover{background:var(--ink-deep);}
.btn-out{display:inline-flex;align-items:center;gap:6px;background:var(--surface);color:var(--text);font-weight:500;font-size:13px;padding:8px 14px;border-radius:10px;border:1px solid var(--line);}
.btn-out:hover{border-color:var(--ink);color:var(--ink);}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(22,53,84,.4);display:none;align-items:center;justify-content:center;z-index:60;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(22,53,84,.25);}
.modal h2{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--ink-deep);margin:0 0 16px;}
.mf{margin-bottom:12px;}
.mf label{display:block;font-size:12.5px;font-weight:500;color:var(--text-soft);margin-bottom:4px;}
.mf input,.mf select,.mf textarea{width:100%;font-family:inherit;font-size:14px;border:1.5px solid var(--line);border-radius:9px;padding:10px 12px;outline:none;color:var(--text);background:var(--paper);}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--ink);}
.mf textarea{min-height:68px;resize:vertical;}
.m2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.mact{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.modal .add{background:var(--ink);color:#fff;font-weight:500;font-size:13.5px;padding:9px 16px;border-radius:9px;}
.modal .add:hover{background:var(--ink-deep);}
.modal .act-btn{font-size:13px;padding:9px 14px;border:1px solid var(--line);border-radius:9px;}
.modal .act-btn:hover{background:var(--paper);}
.modal .del-btn{font-size:13px;padding:9px 14px;border:1px solid #f1d6d0;border-radius:9px;color:var(--coral);font-weight:500;background:none;cursor:pointer;}
.modal .del-btn:hover{background:#fae3df;}
.modal-xl{max-width:780px!important;}
#confirmBg{z-index:65;}
.kp-opt{padding:8px 12px;font-size:13px;cursor:pointer;border-radius:6px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.kp-opt:hover{background:var(--paper);}
.kp-opt-unit{font-size:11px;color:var(--text-soft);white-space:nowrap;}
#kp-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:9px;z-index:200;max-height:180px;overflow-y:auto;box-shadow:0 4px 16px rgba(22,53,84,.12);}
.req{color:var(--coral);font-weight:600;margin-left:1px;}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink-deep);color:#fff;padding:12px 20px;border-radius:11px;font-size:14px;font-weight:500;opacity:0;transform:translateY(14px);transition:all .3s;z-index:70;box-shadow:0 10px 30px rgba(0,0,0,.2);}
.toast.show{opacity:1;transform:none;}


/* ── Budget bars ── */
.bgt-bar-bg{background:var(--line);border-radius:4px;height:7px;overflow:hidden;margin-top:5px;}
.bgt-bar-fill{height:100%;border-radius:4px;transition:width .5s;}

/* ── Recent 3-col grid ── */
.recent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px;}
.ri{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);}
.ri:last-child{border-bottom:none;padding-bottom:0;}
.ri:first-child{padding-top:0;}
.ri-left{flex:1;min-width:0;}
.ri-title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ri-meta{font-size:12px;color:var(--text-soft);}
.ri-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.ri-amount{font-size:13px;font-weight:600;color:var(--ink-deep);}
.recent-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.recent-head h3{font-family:'Lora',serif;font-weight:600;font-size:15px;color:var(--ink-deep);}
.recent-head .rh-link{font-size:12.5px;color:var(--ink);font-weight:500;cursor:pointer;}
.recent-head .rh-link:hover{color:var(--ink-deep);}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:2px solid var(--line);margin-bottom:18px;}
.tab-btn{padding:10px 22px;font-size:14px;font-weight:500;color:var(--text-soft);border:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;background:none;border-radius:0;cursor:pointer;}
.tab-btn.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:600;}
.tab-btn:hover:not(.on){color:var(--text);}
/* ── Tooltip ── */
.tip-wrap{position:relative;display:inline-flex;}
.tip-wrap .tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:11.5px;white-space:nowrap;padding:5px 10px;border-radius:7px;opacity:0;pointer-events:none;transition:opacity .15s;z-index:10;}
.tip-wrap .tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e293b;}
.tip-wrap:hover .tip{opacity:1;}
/* ── Qty control ── */
.qty-step{width:28px;height:30px;border:1.5px solid var(--line);border-radius:7px;background:var(--paper);font-size:17px;font-weight:500;color:var(--text);transition:all .12s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qty-step:hover{border-color:var(--ink);color:var(--ink);}
.qty-input{width:46px;height:30px;border:1.5px solid var(--line);border-radius:7px;font-family:inherit;font-size:13px;outline:none;text-align:center;background:var(--surface);}
.qty-input:focus{border-color:var(--ink);}
.qty-input::-webkit-inner-spin-button,.qty-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}

/* ── Responsive ── */
@media(max-width:960px){
  .shell{grid-template-columns:1fr;}
  .side{display:none;}
  .kpis{grid-template-columns:repeat(3,1fr);}
  .charts-row,.bottom-row,.recent-grid{grid-template-columns:1fr;}
}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr);}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
:focus-visible{outline:2.5px solid var(--marigold);outline-offset:2px;}
</style>
</head>
<body>
<div id="app"></div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)tryCloseModal()"><div class="modal" id="modal"></div></div>
<div class="modal-bg" id="confirmBg" onclick="if(event.target===this)hideConfirm()"><div class="modal" id="confirmModal" style="max-width:360px"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ── Storage (school-specific data) ── */
const LS={
  get(k,d){try{const v=localStorage.getItem('school_'+k);return v===null?d:JSON.parse(v);}catch(e){return d;}},
  set(k,v){try{localStorage.setItem('school_'+k,JSON.stringify(v));}catch(e){}}
};
/* ── Main app session (shared with Sàn Hiệu Sách) ── */
function getMainUser(){try{const v=localStorage.getItem('edumart_user');return v?JSON.parse(v):null;}catch(e){return null;}}
let currentUser=null;
let membersTab='members',memberSearch='',memberGender='all',memberDeptFilter='all',deptSearch='';
let CART=[];
let cartTitle='',cartDesc='',cartNeedDate='',cartNote='';
let cartDept='',cartMember='';
let cartSaveKit=false;
let cartSelected=new Set();

/* ── Formatters ── */
const fmtV=n=>n>=1e9?(n/1e9).toFixed(1).replace(/\.0$/,'')+'tỷ':n>=1e6?(n/1e6).toFixed(0)+'tr':n>=1e3?(n/1e3).toFixed(0)+'k':n;
const fmtC=n=>n.toLocaleString('vi-VN')+'đ';
const pct=(a,b)=>b?Math.round(a/b*100):0;
function readMoney(n){
  if(!n&&n!==0)return'';
  n=Math.abs(Math.round(n));if(n===0)return'Không đồng';
  const d=['không','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'];
  function r3(x){
    if(!x)return'';
    const h=Math.floor(x/100),t=Math.floor(x%100/10),u=x%10;let s='';
    if(h){s+=d[h]+' trăm';if(!t&&u)s+=' linh';}
    if(t===1)s+=(s?' ':'')+'mười';
    else if(t>1)s+=(s?' ':'')+d[t]+' mươi';
    if(u){const w=(t>1&&u===1)?'mốt':(t&&u===5)?'lăm':d[u];s+=(s?' ':'')+w;}
    return s;
  }
  const ty=Math.floor(n/1e9),tr=Math.floor(n%1e9/1e6),ng=Math.floor(n%1e6/1e3),dv=n%1e3;
  const parts=[];
  if(ty)parts.push(r3(ty)+' tỷ');
  if(tr)parts.push(r3(tr)+' triệu');
  if(ng)parts.push(r3(ng)+' nghìn');
  if(dv)parts.push(r3(dv));
  const txt=parts.join(' ');
  return txt.charAt(0).toUpperCase()+txt.slice(1)+' đồng';
}
function parsePrDate(s){const[d,m,y]=(s||'').split('/');return d?new Date(+y,+m-1,+d):null;}
function parseInputDate(s){const[y,m,d]=(s||'').split('-');return y?new Date(+y,+m-1,+d):null;}

/* ── Icons (inline SVG) ── */
function ic(path,size=15){return`<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;}
const I={
  dash:'<rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>',
  org:'<path d="M3 21h18M3 10l9-7 9 7"/><path d="M9 21V14h6v7"/>',
  members:'<circle cx="9" cy="7" r="3"/><path d="M3 20c0-3 2.5-5 6-5s6 2 6 5"/><path d="M16 4a3 3 0 0 1 0 6M19 20c0-2-1.3-3.8-3-4.5"/>',
  catalog:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
  kit:'<path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>',
  incat:'<rect x="2" y="3" width="7" height="7"/><rect x="15" y="3" width="7" height="7"/><rect x="15" y="14" width="7" height="7"/><rect x="2" y="14" width="7" height="7"/>',
  pr:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M12 18v-6M9 15h6"/>',
  appr:'<path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  order:'<path d="M5 4h14l-1 16H6L5 4Z"/><path d="M9 8h6"/>',
  budget:'<path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
  invoice:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>',

/* ── Chart helpers ── */
function lineChart(data,labels,maxV,W,H,lm,bm){
  const rm=16,tm=10,cw=W-lm-rm,ch=H-bm-tm,n=data.length;
  const pts=data.map((v,i)=>({x:lm+(i/(n-1))*cw,y:tm+ch*(1-v/maxV)}));
  const t=0.35;
  let d=`M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
  for(let i=0;i<n-1;i++){
    const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(n-1,i+2)];
    const c1x=p1.x+t*(p2.x-p0.x)/3,c1y=p1.y+t*(p2.y-p0.y)/3;
    const c2x=p2.x-t*(p3.x-p1.x)/3,c2y=p2.y-t*(p3.y-p1.y)/3;
    d+=` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
  }
  const area=d+` L${(lm+cw).toFixed(1)},${(tm+ch)} L${lm},${tm+ch} Z`;
  const yGrids=[0,80,160,240,320].map(v=>{const y=tm+ch*(1-v/maxV);return`<line x1="${lm}" y1="${y.toFixed(1)}" x2="${W-rm}" y2="${y.toFixed(1)}" stroke="#e2e8f0" stroke-width="1"/><text x="${lm-5}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#94a3b8">${v?v+'tr':'0'}</text>`;}).join('');
  const xLabels=labels.map((l,i)=>`<text x="${pts[i].x.toFixed(1)}" y="${H-5}" text-anchor="middle" font-size="10" fill="#94a3b8">${l}</text>`).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4f46e5" stop-opacity=".18"/><stop offset="100%" stop-color="#4f46e5" stop-opacity=".01"/></linearGradient></defs>${yGrids}${xLabels}<path d="${area}" fill="url(#ag)"/><path d="${d}" fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function donutChart(segs){
  const r=52,cx=70,cy=70,sw=20,C=2*Math.PI*r;
  let off=0;
  const circles=segs.map(s=>{const dash=s.p/100*C,gap=C-dash;const c=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${sw}" stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90,${cx},${cy})"/>`;off+=dash;return c;}).join('');
  const legend=segs.map(s=>`<div class="leg-row"><div class="leg-left"><span class="leg-dot" style="background:${s.c}"></span>${s.l}</div><span class="leg-pct">${s.p}%</span></div>`).join('');
  return`<div class="donut-wrap"><svg viewBox="0 0 140 140" width="126" height="126" style="display:block"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f1f5f9" stroke-width="${sw}"/>${circles}<circle cx="${cx}" cy="${cy}" r="${r-sw/2-1}" fill="white"/></svg><div style="width:100%">${legend}</div></div>`;
}

function barChart(labels,vals,color,W,H,lm,bm){
  const tm=10,cw=W-lm,ch=H-bm-tm,n=vals.length,maxV=220;
  const gap=14,bw=(cw-(n+1)*gap)/n;
  const bars=labels.map((l,i)=>{const bh=vals[i]/maxV*ch,x=lm+gap+i*(bw+gap),y=tm+ch-bh;return`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="5" fill="${color}"/><text x="${(x+bw/2).toFixed(1)}" y="${H-7}" text-anchor="middle" font-size="10.5" fill="#64748b">${l}</text>`;}).join('');
  const grids=[0,55,110,165,220].map(v=>{const y=tm+ch*(1-v/maxV);return`<line x1="${lm}" y1="${y.toFixed(1)}" x2="${W}" y2="${y.toFixed(1)}" stroke="#e2e8f0" stroke-width="1"/><text x="${lm-5}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#94a3b8">${v?v+'tr':''}</text>`;}).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block">${grids}${bars}</svg>`;
}

let mkCat='all',mkQ='';

function getTierPrice(product,qty){
  if(!product.tiers||!product.tiers.length)return product.price;
  const tier=product.tiers.find(t=>qty>=t.min&&(t.max===undefined||qty<=t.max));
  return tier?tier.price:product.price;
}

function updateMkPrice(id,qty){
  const p=PRODUCTS.find(x=>x.id===id);
  const el=document.getElementById('mkprice_'+id);
  if(!p||!el)return;
  if(!qty||qty<1){el.textContent='';return;}
  const price=getTierPrice(p,qty);
  el.textContent=`Bạn được mua với giá ${price.toLocaleString('vi-VN')}đ/${p.unit}`;
  el.style.color=price<p.tiers[0].price?'var(--green)':'var(--text-soft)';
}

function stepQty(id,delta){
  const el=document.getElementById('qty_'+id);if(!el)return;
  const p=PRODUCTS.find(x=>x.id===id);
  const max=p&&p.cat!=='Ebook'?p.stock||9999:9999;
  const v=Math.min(max,Math.max(1,(parseInt(el.value)||1)+delta));
  el.value=v;updateMkPrice(id,v);
}

function mkFiltered(){
  const q=mkQ.toLowerCase();
  return PRODUCTS.filter(p=>{
    const mCat=mkCat==='all'||p.cat===mkCat;
    const mQ=!q||p.name.toLowerCase().includes(q);
    return mCat&&mQ;
  });
}

function filterMarketplace(){
  const inp=document.getElementById('mk-search');
  if(inp)mkQ=inp.value;
  const list=mkFiltered();
  const tbody=document.getElementById('mk-tbody');
  if(!tbody)return;
  tbody.innerHTML=list.length
    ?list.map(mkRow).join('')
    :'<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-soft)">Không tìm thấy sản phẩm phù hợp.</td></tr>';
  document.querySelectorAll('.mk-chip').forEach(b=>b.classList.toggle('on',b.dataset.c===mkCat));
}

function marketplace(){
  const cats=['all','SGK','VPP','Thiết bị','Ebook'];
  const chips=cats.map(c=>`<button class="fchip mk-chip${mkCat===c?' on':''}" data-c="${c}" onclick="mkCat='${c}';filterMarketplace()">${c==='all'?'Tất cả':c}</button>`).join('');
  const list=mkFiltered();
  const rows=list.length?list.map(mkRow).join(''):'<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-soft)">Không tìm thấy sản phẩm phù hợp.</td></tr>';
  return`<div class="toolbar"><div style="font-size:15px;font-weight:600">Danh mục sản phẩm</div></div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <div style="position:relative;flex:1;min-width:180px;max-width:300px">
      <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-soft);pointer-events:none" width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="6"/><line x1="13.5" y1="13.5" x2="18" y2="18"/></svg>
      <input id="mk-search" value="${mkQ.replace(/"/g,'&quot;')}" placeholder="Tìm tên sản phẩm..." oninput="filterMarketplace()"
        style="width:100%;box-sizing:border-box;font-family:inherit;font-size:13.5px;border:1.5px solid var(--line);border-radius:10px;padding:8px 12px 8px 32px;outline:none;color:var(--text);background:#fff">
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${chips}</div>
  </div>
  <div class="tb-panel"><table><thead><tr><th>Sản phẩm</th><th>Danh mục</th><th>Đơn giá</th><th>Đơn vị</th><th>Tồn kho</th><th>Số lượng</th></tr></thead><tbody id="mk-tbody">${rows}</tbody></table></div>`;
}

function addToCart(id){
  const p=PRODUCTS.find(x=>x.id===id);if(!p)return;
  const qtyEl=document.getElementById('qty_'+id);
  const qty=qtyEl?Math.max(1,parseInt(qtyEl.value)||1):1;
  const existing=CART.find(x=>x.id===id);
  if(existing){
    existing.qty+=qty;
    existing.price=getTierPrice(p,existing.qty);
    toast(`Đã cập nhật giỏ: "${p.name}" — tổng ${existing.qty} ${p.unit}`);
  } else {
    CART.push({id:p.id,name:p.name,unit:p.unit,qty,price:getTierPrice(p,qty)});
    toast(`Đã thêm "${p.name}" (x${qty}) vào giỏ yêu cầu`);
  }
  updateCartBadge();
}

function updateCartBadge(){
  const badge=document.getElementById('cartBadge');if(!badge)return;
  const total=CART.reduce((s,i)=>s+i.qty,0);
  badge.textContent=total;
  badge.style.display=total>0?'flex':'none';
}

function openCart(){
  document.getElementById('modal').classList.add('modal-xl');
  openModal(cartDialogHTML());
}

function getProductImg(id){
  const seeds={1:237,2:180,3:119,4:91,5:250,6:42,7:63,8:155,9:190,10:215,11:122};
  const s=seeds[id]||(id*37%300+50);
  return`https://picsum.photos/seed/${s}/60/60`;
}

function getProductCode(id){return'SP'+String(id).padStart(3,'0');}

function cartUpdateQty(id,val){
  const item=CART.find(x=>x.id===id);if(!item)return;
  val=Math.max(1,parseInt(val)||1);
  const p=PRODUCTS.find(x=>x.id===id);
  item.qty=val;
  if(p)item.price=getTierPrice(p,val);
  const inp=document.getElementById('cqty_'+id);
  if(inp)inp.value=val;
  const td=document.getElementById('ctotal_'+id);
  if(td)td.textContent=(item.price*item.qty).toLocaleString('vi-VN')+'đ';
  updateCartSummary();
  updateCartBadge();
}

function stepCartQty(id,delta){
  const inp=document.getElementById('cqty_'+id);
  const cur=inp?parseInt(inp.value)||1:1;
  cartUpdateQty(id,cur+delta);
}

function updateCartSummary(){
  const el=document.getElementById('cart-summary');if(!el)return;
  const tI=CART.length,tQ=CART.reduce((s,i)=>s+i.qty,0),tV=CART.reduce((s,i)=>s+i.price*i.qty,0);
  el.innerHTML=`<div style="display:flex;gap:24px;align-items:center">
    <div><div style="font-size:11px;color:var(--text-soft);margin-bottom:1px">Mặt hàng</div><div style="font-size:17px;font-weight:700">${tI}</div></div>
    <div><div style="font-size:11px;color:var(--text-soft);margin-bottom:1px">Số lượng</div><div style="font-size:17px;font-weight:700">${tQ}</div></div>
    <div style="margin-left:auto;text-align:right"><div style="font-size:11px;color:var(--text-soft);margin-bottom:1px">Tổng giá trị dự kiến</div><div style="font-size:20px;font-weight:700;color:var(--ink)">${tV.toLocaleString('vi-VN')}đ</div></div>
  </div>`;
}

function cartDeleteItem(id){
  const idx=CART.findIndex(x=>x.id===id);
  if(idx>-1)CART.splice(idx,1);
  cartSelected.delete(id);
  const row=document.getElementById('crow_'+id);if(row)row.remove();
  updateCartSummary();
  updateCartBadge();
  const hdr=document.getElementById('cart-h-count');
  if(hdr)hdr.textContent=CART.length?`(${CART.length} sản phẩm)`:'';
  if(!CART.length){
    const tbody=document.querySelector('#cart-table tbody');
    if(tbody)tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:36px;color:var(--text-soft)">Giỏ trống — <a href="#" style="color:var(--ink)" onclick="closeModal();nav('marketplace');return false">tiếp tục mua sắm</a></td></tr>`;
  }
}

function cartToggle(id){
  if(cartSelected.has(id))cartSelected.delete(id);else cartSelected.add(id);
  const cb=document.getElementById('cchk_'+id);if(cb)cb.checked=cartSelected.has(id);
  const row=document.getElementById('crow_'+id);if(row)row.style.background=cartSelected.has(id)?'var(--surface)':'';
  const allChk=document.getElementById('cchk_all');if(allChk)allChk.checked=CART.length>0&&cartSelected.size===CART.length;
  cartRefreshDelBtn();
}

function cartToggleAll(checked){
  cartSelected.clear();
  if(checked)CART.forEach(i=>cartSelected.add(i.id));
  CART.forEach(i=>{
    const cb=document.getElementById('cchk_'+i.id);if(cb)cb.checked=checked;
    const row=document.getElementById('crow_'+i.id);if(row)row.style.background=checked?'var(--surface)':'';
  });
  cartRefreshDelBtn();
}

function cartRefreshDelBtn(){
  const btn=document.getElementById('cart-del-sel');
  if(btn)btn.textContent=`Xóa đã chọn (${cartSelected.size})`;
  const wrap=document.getElementById('cart-del-sel-wrap');
  if(wrap)wrap.style.display=cartSelected.size>0?'':'none';
}

function cartDeleteSelected(){
  [...cartSelected].forEach(id=>cartDeleteItem(id));
  cartSelected.clear();
  const allChk=document.getElementById('cchk_all');if(allChk)allChk.checked=false;
  cartRefreshDelBtn();
}

      <div><div style="font-size:11px;color:var(--text-soft);margin-bottom:1px">Số lượng</div><div style="font-size:17px;font-weight:700">${tQ}</div></div>

function cartSaveDraft(){
  if(!cartTitle.trim()){toast('Vui lòng nhập tên yêu cầu trước khi lưu nháp');return;}
  toast(`Đã lưu nháp "${cartTitle}"`);
}

function cartDeptChange(val){
  cartDept=val;
  cartMember='';
  const sel=document.getElementById('cart-member-sel');if(!sel)return;
  const members=MEMBERS.filter(m=>m.dept===val&&m.status==='active');
  sel.disabled=!val||!members.length;
  sel.innerHTML=`<option value="">— Chọn nhân viên —</option>`
    +members.map(m=>`<option value="${m.name}">${m.name}</option>`).join('');
}

function cartSubmit(){
  if(!cartTitle.trim()){toast('Vui lòng nhập tên yêu cầu');return;}
  if(!cartDept){toast('Vui lòng chọn phòng ban');return;}
  if(!cartMember){toast('Vui lòng chọn người tạo');return;}
  if(!CART.length){toast('Giỏ yêu cầu đang trống');return;}
  if(cartSaveKit){
    const kitItems=CART.map(i=>({id:i.id,name:i.name,unit:i.unit,qty:i.qty}));
    KITS.push({id:Date.now(),name:cartTitle.trim(),desc:cartNote,grade:'',price:0,items:CART.length,students:0,products:kitItems});
    LS.set('kits',KITS);
    toast(`Đã lưu School Kit "${cartTitle.trim()}"`);
  }
  const total=CART.reduce((s,i)=>s+i.price*i.qty,0);
  const totalQty=CART.reduce((s,i)=>s+i.qty,0);
  const n=PRS.length+1;
  const id=`PR-2026-0${49+n}`;
  PRS.unshift({id,title:cartTitle.trim(),dept:cartDept,by:cartMember,date:new Date().toLocaleDateString('vi-VN'),total,status:'pending',items:CART.length,lvl:total>50e6?2:1,price:totalQty>0?Math.round(total/totalQty):0,products:CART.map(i=>({...i}))});
  LS.set('prs',PRS);
  CART.splice(0);cartSelected.clear();
  cartTitle='';cartDesc='';cartNeedDate='';cartNote='';
  cartDept='';cartMember='';
  cartSaveKit=false;
  updateCartBadge();
  closeModal();
  toast(`Đã tạo ${id} thành công · ${fmtC(total)}`);
  nav('purchase',null);
}

/* ── School Kit ── */
let kitQ='',kitGrade='all';

function kitCard(k){
  return`<div class="panel" style="cursor:default;display:flex;flex-direction:column;gap:0">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
      <div style="flex:1;min-width:0;padding-right:10px">
        <div style="font-weight:600;font-size:13.5px;margin-bottom:5px;line-height:1.4">${k.name}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${k.grade?`<span class="badge bb">${k.grade}</span>`:''}
          ${k.products&&k.products.length?'<span class="badge bg">Có danh sách SP</span>':''}
        </div>
      </div>
      ${k.price?`<span style="font-size:17px;font-weight:700;color:var(--ink);white-space:nowrap">${k.price.toLocaleString('vi-VN')}đ</span>`:''}
    </div>
    ${k.desc?`<div style="font-size:12px;color:var(--text-soft);margin-bottom:8px;line-height:1.5">${k.desc}</div>`:''}
    <div style="font-size:12px;color:var(--text-soft);margin-bottom:14px">${k.items} sản phẩm${k.students?` · ${k.students} học sinh dự kiến`:''}</div>
    <div style="display:flex;gap:8px;margin-top:auto;flex-wrap:nowrap">
      <button class="act-sm" style="white-space:nowrap" onclick="viewKit(${k.id})">Xem chi tiết</button>
      <button class="btn-pr" style="font-size:12px;padding:5px 12px;white-space:nowrap;flex:1;justify-content:center" onclick="orderKit(${k.id})">+ Tạo yêu cầu mua hàng</button>
    </div>
  </div>`;
}

function kitMatchGrade(grade,f){
  if(f==='all')return true;
  const g=(grade||'').toLowerCase();
  if(f==='th')return /lớp\s*[1-5]$/.test(g)||g.includes('tiểu học');
  if(f==='thcs')return /lớp\s*[6-9]$/.test(g)||g.includes('thcs');
  if(f==='thpt')return /lớp\s*1[0-2]/.test(g)||g.includes('thpt');
  if(f==='staff')return g.includes('giáo viên')||g.includes('bgh')||g.includes('văn phòng');
  return true;
}

function kitFiltered(){
  const q=kitQ.toLowerCase();
  return KITS.filter(k=>{
    const mQ=!q||k.name.toLowerCase().includes(q)||(k.grade||'').toLowerCase().includes(q);
    return mQ&&kitMatchGrade(k.grade,kitGrade);
  });
}

function filterKits(){
  const inp=document.getElementById('kit-search');
  if(inp)kitQ=inp.value;
  const list=kitFiltered();
  const grid=document.getElementById('kit-grid');
  if(!grid)return;
  grid.innerHTML=list.length
    ?list.map(kitCard).join('')
    :`<div style="grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--text-soft);font-size:13.5px">Không tìm thấy School Kit phù hợp.</div>`;
  document.querySelectorAll('.kit-chip').forEach(b=>b.classList.toggle('on',b.dataset.g===kitGrade));
}

function schoolkit(){
  const GRADE_CHIPS=[
    {k:'all',l:'Tất cả'},
    {k:'th',l:'Tiểu học'},
    {k:'thcs',l:'THCS'},
    {k:'thpt',l:'THPT'},
    {k:'staff',l:'Giáo viên & BGH'},
  ];
  const chips=GRADE_CHIPS.map(g=>`<button class="fchip kit-chip${kitGrade===g.k?' on':''}" data-g="${g.k}" onclick="kitGrade='${g.k}';filterKits()">${g.l}</button>`).join('');
  const list=kitFiltered();
  const cards=list.length
    ?list.map(kitCard).join('')
    :`<div style="grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--text-soft);font-size:13.5px">Không tìm thấy School Kit phù hợp.</div>`;
  return`<div class="toolbar"><div style="font-size:15px;font-weight:600">School Kit — Bộ sản phẩm theo cấp học</div></div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <div style="position:relative;flex:1;min-width:180px;max-width:300px">
      <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-soft);pointer-events:none" width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="6"/><line x1="13.5" y1="13.5" x2="18" y2="18"/></svg>
      <input id="kit-search" value="${kitQ.replace(/"/g,'&quot;')}" placeholder="Tìm tên kit, cấp học..." oninput="filterKits()"
        style="width:100%;box-sizing:border-box;font-family:inherit;font-size:13.5px;border:1.5px solid var(--line);border-radius:10px;padding:8px 12px 8px 32px;outline:none;color:var(--text);background:#fff">
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${chips}</div>
  </div>
  <div id="kit-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px">${cards}</div>`;
}

function viewKit(id){
  const k=KITS.find(x=>x.id===id);if(!k)return;
  if(!k.products)k.products=[];
  const prodRows=k.products.length
    ?k.products.map((p,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;${i?'border-top:1px solid var(--line)':''}">
        <div style="flex:1;font-size:13px;font-weight:500;min-width:0">${p.name}</div>
        <div style="font-size:12px;color:var(--text-soft);white-space:nowrap">${p.qty} ${p.unit}</div>
        <button onclick="removeKitProduct(${id},${i})" style="flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1px solid var(--line);background:none;color:var(--text-soft);font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center" title="Xóa sản phẩm">×</button>
      </div>`).join('')
    :`<div style="padding:18px 12px;text-align:center;font-size:12.5px;color:var(--text-soft)">Chưa có sản phẩm nào trong kit.</div>`;
  openModal(`<h2>Chi tiết School Kit</h2>
  <div class="mf"><label>Tên Kit</label><input id="kedit-name" value="${k.name.replace(/"/g,'&quot;')}"></div>
  <div class="m2">
    <div class="mf"><label>Cấp học / Nhóm</label><input id="kedit-grade" value="${(k.grade||'').replace(/"/g,'&quot;')}"></div>
    <div class="mf"><label>Số học sinh dự kiến</label><input type="number" id="kedit-students" value="${k.students||0}"></div>
  </div>
  <div class="mf"><label>Mô tả</label><textarea id="kedit-desc" rows="2">${k.desc||''}</textarea></div>
  <div style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
      <span style="font-size:12.5px;font-weight:600;color:var(--text-soft)">Danh sách sản phẩm (${k.products.length})</span>
    </div>
    <div style="border:1px solid var(--line);border-radius:9px;max-height:180px;overflow-y:auto;margin-bottom:10px">${prodRows}</div>
    <div id="kp-add-link">
      <a href="#" onclick="showKitAddForm();return false" style="font-size:12.5px;font-weight:500;color:var(--ink);text-decoration:none">+ Thêm sản phẩm</a>
    </div>
    <div id="kp-add-form" style="display:none;gap:6px;align-items:center;margin-top:4px">
      <div style="flex:1;position:relative;min-width:0">
        <input id="kp-name" placeholder="Tìm tên sản phẩm..." autocomplete="off"
          style="width:100%;font-family:inherit;font-size:13px;border:1.5px solid var(--line);border-radius:9px;padding:7px 10px;outline:none;color:var(--text);background:var(--paper);box-sizing:border-box"
          oninput="kitProductSearch()"
          onblur="setTimeout(()=>{const d=document.getElementById('kp-dropdown');if(d)d.style.display='none'},200)">
        <div id="kp-dropdown"></div>
      </div>
      <input id="kp-qty" type="number" min="1" value="1"
        style="width:58px;font-family:inherit;font-size:13px;border:1.5px solid var(--line);border-radius:9px;padding:7px 8px;outline:none;color:var(--text);background:var(--paper)">
      <button class="add" style="padding:7px 14px;font-size:13px;white-space:nowrap" onclick="addKitProduct(${id})">Thêm</button>
    </div>
  </div>
  <div class="mact" style="justify-content:space-between">
    <button class="del-btn" onclick="deleteKit(${id})">Xóa Kit</button>
    <div style="display:flex;gap:8px">
      <button class="act-btn" onclick="closeModal()">Đóng</button>
      <button class="add" onclick="saveKit(${id})">Lưu thay đổi</button>
    </div>
  </div>`);
}

function removeKitProduct(kitId,idx){
  const k=KITS.find(x=>x.id===kitId);if(!k||!k.products)return;
  k.products.splice(idx,1);
  k.items=k.products.length;
  LS.set('kits',KITS);
  viewKit(kitId);
}

let _kitSelUnit='cái';

function showKitAddForm(){
  document.getElementById('kp-add-link').style.display='none';
  const f=document.getElementById('kp-add-form');
  f.style.display='flex';
  document.getElementById('kp-name').focus();
}

function kitProductSearch(){
  const q=(document.getElementById('kp-name').value||'').toLowerCase().trim();
  const dd=document.getElementById('kp-dropdown');
  if(!q){dd.style.display='none';return;}
  const hits=PRODUCTS.filter(p=>p.name.toLowerCase().includes(q)).slice(0,7);
  if(!hits.length){dd.style.display='none';return;}
  dd.innerHTML=hits.map(p=>`<div class="kp-opt" onmousedown="selectKitProduct('${p.name.replace(/'/g,"\\'")}','${p.unit}')"><span>${p.name}</span><span class="kp-opt-unit">${p.unit}</span></div>`).join('');
  dd.style.display='block';
}

function selectKitProduct(name,unit){
  document.getElementById('kp-name').value=name;
  _kitSelUnit=unit;
  document.getElementById('kp-dropdown').style.display='none';
}

function addKitProduct(kitId){
  const k=KITS.find(x=>x.id===kitId);if(!k)return;
  const name=(document.getElementById('kp-name').value||'').trim();
  if(!name){toast('Nhập tên sản phẩm');return;}
  const qty=+document.getElementById('kp-qty').value||1;
  const unit=_kitSelUnit||'cái';
  if(!k.products)k.products=[];
  k.products.push({id:Date.now(),name,unit,qty});
  k.items=k.products.length;
  LS.set('kits',KITS);
  _kitSelUnit='cái';
  viewKit(kitId);
}

function saveKit(id){
  const k=KITS.find(x=>x.id===id);if(!k)return;
  const name=(document.getElementById('kedit-name').value||'').trim();
  if(!name){toast('Tên Kit không được để trống');return;}
  k.name=name;
  k.grade=(document.getElementById('kedit-grade').value||'').trim();
  k.desc=(document.getElementById('kedit-desc').value||'').trim();
  k.students=+document.getElementById('kedit-students').value||0;
  LS.set('kits',KITS);
  closeModal();toast('Đã lưu thay đổi');render();
}

function deleteKit(id){
  const idx=KITS.findIndex(x=>x.id===id);
  if(idx>-1)KITS.splice(idx,1);
  LS.set('kits',KITS);
  closeModal();toast('Đã xóa School Kit');render();
}

function orderKit(id){
  const k=KITS.find(x=>x.id===id);if(!k)return;
  if(k.products&&k.products.length){
    k.products.forEach(p=>{
      const prod=PRODUCTS.find(x=>x.id===p.id);
      const existing=CART.find(x=>x.id===p.id);
      if(existing){
        existing.qty+=p.qty;
        if(prod)existing.price=getTierPrice(prod,existing.qty);
      } else {
        CART.push({id:p.id,name:p.name,unit:p.unit,qty:p.qty,price:prod?getTierPrice(prod,p.qty):0});
      }
    });
    updateCartBadge();
    toast(`Đã tải ${k.products.length} sản phẩm từ "${k.name}" vào giỏ`);
  }
  cartTitle=k.name;
  cartNote=k.desc||'';
  openCart();
}

/* ── Purchase Requests ── */
let prFilter='all',prSearch='',prDateFrom='',prDateTo='';
let calOpen=false,calYear=2026,calMonth=5;
let statusOpen=false;

function calNav(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  render();
}
function calPick(ds){
  if(!prDateFrom||ds<prDateFrom){prDateFrom=ds;prDateTo='';}
  else if(!prDateTo&&ds>=prDateFrom){prDateTo=ds;calOpen=false;}
  else{prDateFrom=ds;prDateTo='';}
  render();
}
function calClear(){prDateFrom='';prDateTo='';calOpen=false;render();}

function renderCal(){
  const MN=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  const DN=['CN','T2','T3','T4','T5','T6','T7'];
  const first=new Date(calYear,calMonth,1).getDay();
  const total=new Date(calYear,calMonth+1,0).getDate();
  const pad=s=>String(s).padStart(2,'0');
  let cells=[];
  for(let i=0;i<first;i++)cells.push(null);
  for(let d=1;d<=total;d++)cells.push(d);
  while(cells.length%7)cells.push(null);
  const rows=[];
  for(let r=0;r<cells.length/7;r++){
    const week=cells.slice(r*7,(r+1)*7).map(d=>{
      if(!d)return`<td style="padding:5px"></td>`;
      const ds=`${calYear}-${pad(calMonth+1)}-${pad(d)}`;
      const isF=ds===prDateFrom,isT=ds===prDateTo;
      const inR=prDateFrom&&prDateTo&&ds>prDateFrom&&ds<prDateTo;
      const today=new Date().toISOString().slice(0,10);
      let bg=isF||isT?'background:var(--ink);color:#fff;font-weight:700;':inR?'background:rgba(22,53,84,.12);':'';
      let extra=ds===today&&!isF&&!isT?'font-weight:600;color:var(--ink);':'';
      return`<td onclick="calPick('${ds}')" style="padding:5px;text-align:center;cursor:pointer;border-radius:7px;font-size:13px;${bg}${extra}">${d}</td>`;
    }).join('');
    rows.push(`<tr>${week}</tr>`);
  }
  const btnSt='background:none;border:none;cursor:pointer;font-size:18px;padding:2px 8px;color:var(--ink);border-radius:7px;';
  const hint=prDateFrom&&!prDateTo?`<div style="font-size:11.5px;color:var(--ink);text-align:center;margin-top:8px">Chọn ngày kết thúc</div>`:
    prDateFrom&&prDateTo?`<div style="font-size:11.5px;color:var(--text-soft);text-align:center;margin-top:8px">${prDateFrom.split('-').reverse().join('/')} → ${prDateTo.split('-').reverse().join('/')}</div>`:'';
  return`<div style="position:absolute;top:calc(100% + 6px);left:0;z-index:55;background:#fff;border:1.5px solid var(--line);border-radius:12px;box-shadow:0 8px 32px rgba(22,53,84,.18);padding:14px 12px;min-width:252px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button style="${btnSt}" onclick="calNav(-1)">‹</button>
      <span style="font-size:13.5px;font-weight:600">${MN[calMonth]} ${calYear}</span>
      <button style="${btnSt}" onclick="calNav(1)">›</button>
    </div>
    <table style="border-collapse:collapse;width:100%">
      <thead><tr>${DN.map(d=>`<th style="font-size:11px;color:var(--text-soft);padding:4px 5px;text-align:center;font-weight:500">${d}</th>`).join('')}</tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>
    ${hint}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)">
      <button onclick="calClear()" style="font-size:12px;color:var(--coral);background:none;border:none;cursor:pointer;${!prDateFrom?'opacity:.4;pointer-events:none':''}">Xóa lọc ngày</button>
      <button onclick="calOpen=false;render()" style="font-size:12px;padding:5px 12px;border:1.5px solid var(--line);border-radius:8px;background:none;cursor:pointer;font-family:inherit">Đóng</button>
    </div>
  </div>`;
}

const STATUS_OPTS=[
  {v:'all',label:'Tất cả trạng thái',dot:''},
  {v:'pending',label:'Chờ duyệt',dot:'#c2410c'},
  {v:'approved',label:'Đã duyệt',dot:'#15803d'},
  {v:'rejected',label:'Từ chối',dot:'#b91c1c'},
  {v:'done',label:'Hoàn thành',dot:'#475569'},
];
function renderStatusDrop(){
  const cur=STATUS_OPTS.find(o=>o.v===prFilter)||STATUS_OPTS[0];
  const items=STATUS_OPTS.map(o=>{
    const active=o.v===prFilter;
    const dot=o.dot?`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${o.dot};flex-shrink:0"></span>`:'<span style="display:inline-block;width:7px;height:7px;flex-shrink:0"></span>';
    return`<div onclick="prFilter='${o.v}';statusOpen=false;render()" style="display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-radius:8px;font-size:13px;font-weight:${active?600:400};color:${active?'var(--ink)':'var(--text)'};background:${active?'rgba(22,53,84,.07)':'none'};white-space:nowrap" onmouseenter="this.style.background='rgba(22,53,84,.05)'" onmouseleave="this.style.background='${active?'rgba(22,53,84,.07)':'none'}'">
      ${dot}<span>${o.label}</span>${active?`<svg style="margin-left:auto" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`:''}
    </div>`;
  }).join('');
  const dotHtml=cur.dot?`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${cur.dot};flex-shrink:0"></span>`:'';
  return`<div style="position:relative;flex-shrink:0">
    <button onclick="statusOpen=!statusOpen;calOpen=false;render()" style="font-family:inherit;font-size:13px;border:1.5px solid ${statusOpen?'var(--ink)':prFilter!=='all'?'var(--ink)':'var(--line)'};border-radius:9px;padding:7px 11px;outline:none;background:var(--paper);color:${prFilter!=='all'?'var(--ink)':'var(--text)'};cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;font-weight:${prFilter!=='all'?500:400}">
      ${dotHtml}${cur.label}
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-left:2px;opacity:.5;transition:transform .15s;${statusOpen?'transform:rotate(180deg)':''}"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    ${statusOpen?`<div style="position:absolute;top:calc(100% + 6px);left:0;z-index:55;background:#fff;border:1.5px solid var(--line);border-radius:12px;box-shadow:0 8px 32px rgba(22,53,84,.18);padding:6px;min-width:192px">${items}</div>`:''}
  </div>`;
}

function purchase(){
  const hasFilter=prSearch||prFilter!=='all'||prDateFrom||prDateTo;
  const list=PRS.filter(p=>{
    if(prSearch){const q=prSearch.toLowerCase();if(!p.title.toLowerCase().includes(q)&&!(p.by||'').toLowerCase().includes(q))return false;}
    if(prFilter!=='all'&&p.status!==prFilter)return false;
    if(prDateFrom||prDateTo){
      const pd=parsePrDate(p.date);
      if(pd&&prDateFrom&&pd<parseInputDate(prDateFrom))return false;
      if(pd&&prDateTo&&pd>parseInputDate(prDateTo))return false;
    }
    return true;
  });
  const fD=s=>s?s.split('-').reverse().slice(0,2).join('/'):null;
  const dateBtnLabel=prDateFrom&&prDateTo?`${fD(prDateFrom)} – ${fD(prDateTo)}`:prDateFrom?`Từ ${fD(prDateFrom)} …`:'Ngày tạo';
  const dateBtnActive=prDateFrom||prDateTo;
  const IS='font-family:inherit;font-size:13px;border:1.5px solid var(--line);border-radius:9px;padding:7px 11px;outline:none;background:var(--paper);color:var(--text)';
  const rows=list.map(p=>{
    const unitPrice=p.price||Math.round(p.total/(p.items||1));
    return`<tr>
      <td style="font-weight:600;white-space:nowrap;font-size:12.5px">${p.id}</td>
      <td><div style="font-weight:500">${p.title}</div><div style="font-size:11.5px;color:var(--text-soft);margin-top:2px">${p.dept}</div></td>
      <td style="white-space:nowrap">${p.by||'—'}</td>
      <td style="white-space:nowrap">${p.date}</td>
      <td>
        <div style="font-weight:500;white-space:nowrap">${unitPrice.toLocaleString('vi-VN')}đ</div>
        <div style="font-size:11px;color:var(--text-soft);margin-top:2px;line-height:1.4">${readMoney(unitPrice)}</div>
      </td>
      <td>
        <div style="font-weight:600;white-space:nowrap">${p.total.toLocaleString('vi-VN')}đ</div>
        <div style="font-size:11px;color:var(--text-soft);margin-top:2px;line-height:1.4">${readMoney(p.total)}</div>
      </td>
      <td><span class="badge ${PR_STATUS[p.status][1]}">${PR_STATUS[p.status][0]}</span></td>
      <td><button class="act-sm" onclick="viewPR('${p.id}')">Xem chi tiết</button></td>
    </tr>`;
  }).join('');

  return`
  ${calOpen||statusOpen?`<div onclick="calOpen=false;statusOpen=false;render()" style="position:fixed;inset:0;z-index:50"></div>`:''}
  <div class="panel" style="padding:12px 16px;margin-bottom:14px">
    <div style="display:flex;gap:8px;align-items:center">
      <input style="${IS};width:180px;flex-shrink:0" placeholder="Tìm nội dung, người tạo..." value="${prSearch}" oninput="prSearch=this.value;render()">
      ${renderStatusDrop()}
      <div style="position:relative;flex-shrink:0">
        <button onclick="calOpen=!calOpen;statusOpen=false;render()" style="${IS};cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;${dateBtnActive?'border-color:var(--ink);font-weight:500;color:var(--ink)':'color:var(--text-soft)'}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${dateBtnLabel}
        </button>
        ${calOpen?renderCal():''}
      </div>
      ${hasFilter?`<button class="act-sm" onclick="prSearch='';prFilter='all';prDateFrom='';prDateTo='';calOpen=false;statusOpen=false;render()" style="flex-shrink:0;white-space:nowrap">✕ Xóa lọc</button>`:''}
      ${hasFilter?`<span style="font-size:12px;color:var(--text-soft);white-space:nowrap;margin-left:4px"><b style="color:var(--ink)">${list.length}</b> kết quả</span>`:''}
    </div>
  </div>
  <div class="tb-panel"><table><thead><tr><th>Mã YC</th><th>Nội dung</th><th>Người tạo</th><th>Ngày tạo</th><th>Đơn giá</th><th>Tổng tiền</th><th>Trạng thái</th><th></th></tr></thead>
  <tbody>${rows}${!list.length?`<tr><td colspan="8" style="text-align:center;padding:36px;color:var(--text-soft)">${hasFilter?'Không tìm thấy kết quả phù hợp':'Chưa có yêu cầu mua hàng'}</td></tr>`:''}</tbody></table></div>`;
}

  <div class="mf"><label>Tiêu đề yêu cầu</label><input id="prTitle" placeholder="VD: Mua bộ SGK lớp 10 năm học 2026-2027"></div>

function savePR(){
  const title=(document.getElementById('prTitle').value||'').trim();
  if(!title){toast('Nhập tiêu đề yêu cầu');return;}
  const dept=document.getElementById('prDept').value;
  const total=+(document.getElementById('prBudget').value)||0;
  const items=+(document.getElementById('prItems').value)||1;
  const n=PRS.length+1;
  const id=`PR-2026-0${49+n}`;
  PRS.unshift({id,title,dept,by:'Nguyễn Văn An',date:new Date().toLocaleDateString('vi-VN'),total,status:'pending',items,lvl:total>50e6?2:1});

  const p=PRS.find(x=>x.id===id);if(!p)return;

        <td style="padding:8px 10px;font-size:13px;font-weight:500">${item.name}</td>
        <td style="padding:8px 10px;font-size:12.5px;color:var(--text-soft);white-space:nowrap;text-align:right">${item.price?item.price.toLocaleString('vi-VN')+'đ':'—'}</td>
        <td style="padding:8px 10px;text-align:center;font-size:13px;white-space:nowrap">${item.qty} ${item.unit}</td>
        <td style="padding:8px 10px;font-weight:600;font-size:13px;white-space:nowrap;text-align:right">${item.price?(item.price*item.qty).toLocaleString('vi-VN')+'đ':'—'}</td>
      </tr>`).join('')
    :`<tr><td colspan="5" style="padding:16px;text-align:center;font-size:12.5px;color:var(--text-soft)">Không có dữ liệu chi tiết sản phẩm</td></tr>`;
  document.getElementById('modal').classList.add('modal-xl');
  openModal(`<h2 style="margin-bottom:4px">${p.id}</h2>
  <div style="font-size:13.5px;font-weight:600;margin-bottom:12px">${p.title}</div>

let apprTab='pending';
function approvals(){
  const pending=PRS.filter(p=>p.status==='pending');
  const tabs=['pending','approved','rejected'].map(t=>`<button class="fchip ${apprTab===t?'on':''}" onclick="apprTab='${t}';render()">${t==='pending'?`Chờ duyệt (${pending.length})`:t==='approved'?'Đã duyệt':'Từ chối'}</button>`).join('');
  const list=apprTab==='pending'?pending:PRS.filter(p=>p.status===apprTab);
  const rows=list.map(p=>`<tr>
    <td style="font-weight:600">${p.id}</td>

    <td style="font-weight:600">${fmtV(p.total)}đ</td>

    <td>${apprTab==='pending'?`<div style="display:flex;gap:6px">
      <button class="btn-pr" style="font-size:12px;padding:5px 10px" onclick="apprAction('${p.id}','approved')">Duyệt</button>
      <button class="del-sm" onclick="apprAction('${p.id}','rejected')">Từ chối</button>
    </div>`:`<span class="badge ${PR_STATUS[p.status][1]}">${PR_STATUS[p.status][0]}</span>`}</td>
  </tr>`).join('');
  return`<div class="toolbar"><div style="font-size:15px;font-weight:600">Trung tâm Phê duyệt</div><div class="sp"></div>${tabs}</div>
  <div class="tb-panel"><table><thead><tr><th>Mã YC</th><th>Nội dung</th><th>Giá trị</th><th>Cấp</th><th>Ngày tạo</th><th>Hành động</th></tr></thead>
  <tbody>${rows}${!list.length?'<tr><td colspan="6" style="text-align:center;padding:28px;color:var(--text-soft)">Không có yêu cầu</td></tr>':''}</tbody></table></div>`;

function apprAction(id,status){
  const p=PRS.find(x=>x.id===id);if(!p)return;
  p.status=status;LS.set('prs',PRS);
  toast(status==='approved'?`Đã duyệt ${id}`:`Đã từ chối ${id}`);render();
}

      ${[['📞 Hotline B2B','1800 1234 (Miễn phí)'],['📧 Email','b2b@hieuach.vn'],['💬 Live Chat','Thứ 2 – Thứ 6: 8:00–17:30'],['📍 Văn phòng','18 Nguyễn Thị Minh Khai, Q.1, TP.HCM']].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px">
        <span style="color:var(--text-soft)">${l}</span><span style="font-weight:500">${v}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

/* ── Render dispatcher ── */
function render(){
  const c=document.getElementById('content');if(!c)return;
  if(curV==='dashboard')c.innerHTML=dashboard();
  else if(curV==='marketplace')c.innerHTML=marketplace();
  else if(curV==='schoolkit')c.innerHTML=schoolkit();
  else if(curV==='purchase')c.innerHTML=purchase();
  else if(curV==='approvals'){if(currentUser?.subRole==='BGH')c.innerHTML=approvals();else nav('dashboard',null);}
  else if(curV==='orders')c.innerHTML=orders();
  else if(curV==='budget')c.innerHTML=budget();
  else if(curV==='invoices')c.innerHTML=invoices();
  else if(curV==='ebook')c.innerHTML=ebook();
  else if(curV==='rfq')c.innerHTML=rfq();
  else if(curV==='contracts')c.innerHTML=contracts();
  else if(curV==='members')c.innerHTML=members();
  else if(curV==='organization')c.innerHTML=organization();
  else if(curV==='reports')c.innerHTML=reports();
  else if(curV==='notifications')c.innerHTML=notifications();
  else if(curV==='internalcat')c.innerHTML=internalcat();
  else if(curV==='support')c.innerHTML=support();
  else c.innerHTML=`<div class="panel" style="text-align:center;padding:40px;color:var(--text-soft)">Trang đang được phát triển</div>`;
}

/* ── Shell builder ── */
function userInitials(name){return(name||'').split(' ').filter(Boolean).map(w=>w[0]).slice(-2).join('').toUpperCase()||'?';}
function renderShell(){
  const isBGH=currentUser?.subRole==='BGH';
  const sidebar=NAV.filter(n=>n.v!=='approvals'||isBGH).map(n=>{
    if(n.g)return`<div class="navg">${n.g}</div>`;
    const badge=n.badge?`<span class="nb">${n.badge}</span>`:'';
    return`<button class="nav-item${n.v===curV?' on':''}" data-v="${n.v}" onclick="nav('${n.v}',this)">${ic(I[n.i]||I.dash,18)} ${n.l}${badge}</button>`;
  }).join('');

  const uName=currentUser?.name||ORG.name;
  const uEmail=currentUser?.email||'';
  const uInitials=userInitials(uName);

  document.getElementById('app').innerHTML=`
  <div class="shell">
    <aside class="side">
      <div class="logo">
        <span class="mark"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5a1 1 0 0 1 1-1h6v16H5a1 1 0 0 1-1-1Z"/><path d="M13 4h6a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-6"/></svg></span>
        <span class="name">EduMart<small>Cổng Trường học</small></span>
      </div>
      ${sidebar}
      <div class="side-foot">
        <div class="av">${uInitials}</div>
        <div style="flex:1;min-width:0"><div class="nm">${uName}</div><div class="rl">${uEmail}</div></div>
        <button class="cog" onclick="logout()" title="Đăng xuất">${ic(I.logout,15)}</button>
      </div>
    </aside>
    <div class="main">
      <div class="topbar">
        <h1 id="pageTitle">${NAV.find(n=>n.v===curV)?.l||'Dashboard'}</h1>
        <div class="sp"></div>
        <button class="tb-btn" id="cartBtn" onclick="openCart()" title="Giỏ yêu cầu" style="position:relative">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span id="cartBadge" style="display:none;position:absolute;top:-5px;right:-5px;background:var(--coral);color:#fff;font-size:9.5px;font-weight:700;min-width:17px;height:17px;border-radius:9px;padding:0 3px;align-items:center;justify-content:center;pointer-events:none">0</span>
        </button>
        <button class="tb-btn" onclick="toast('Không có thông báo mới')" title="Thông báo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 8-3 8h18s-3-1-3-8M13.7 21a2 2 0 0 1-3.4 0"/></svg></button>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>`;
}

/* ── Auth / Session ── */
function logout(){
  try{localStorage.removeItem('edumart_user');}catch(e){}
  window.location.href='./';
}

function init(){
  const mu=getMainUser();
  if(mu&&mu.role==='school'){
    currentUser=mu;
    // Use org name from user profile (orgName field if set, else user name)
    ORG.name=mu.orgName||mu.name||ORG.name;
    renderShell();render();
  } else {
    // Not logged in or wrong role → back to main app login
    window.location.href='./';
  }
}
init();
</script>
</body>
</html>
